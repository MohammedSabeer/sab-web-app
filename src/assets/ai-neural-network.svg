<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <!-- Grid Pattern -->
  <g opacity="0.1">
    <path d="M0,0 L1200,0 L1200,800 L0,800 Z" fill="none" stroke="#60a5fa" stroke-width="1"/>
    <path d="M100,0 L100,800 M200,0 L200,800 M300,0 L300,800 M400,0 L400,800 M500,0 L500,800 M600,0 L600,800 M700,0 L700,800 M800,0 L800,800 M900,0 L900,800 M1000,0 L1000,800 M1100,0 L1100,800" stroke="#60a5fa" stroke-width="0.5"/>
    <path d="M0,100 L1200,100 M0,200 L1200,200 M0,300 L1200,300 M0,400 L1200,400 M0,500 L1200,500 M0,600 L1200,600 M0,700 L1200,700" stroke="#60a5fa" stroke-width="0.5"/>
  </g>
  
  <!-- Central Brain/AI Network -->
  <g transform="translate(600, 400)">
    <!-- Central Circle -->
    <circle cx="0" cy="0" r="80" fill="url(#aiGrad1)" opacity="0.3">
      <animate attributeName="r" values="80;85;80" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="60" fill="url(#aiGrad1)" opacity="0.5"/>
    <circle cx="0" cy="0" r="40" fill="url(#aiGrad2)"/>
    
    <!-- Neural Network Nodes -->
    <g opacity="0.8">
      <!-- Top nodes -->
      <circle cx="-120" cy="-120" r="20" fill="#60a5fa"/>
      <circle cx="0" cy="-150" r="20" fill="#14b8a6"/>
      <circle cx="120" cy="-120" r="20" fill="#8b5cf6"/>
      
      <!-- Middle nodes -->
      <circle cx="-160" cy="0" r="20" fill="#f59e0b"/>
      <circle cx="160" cy="0" r="20" fill="#ec4899"/>
      
      <!-- Bottom nodes -->
      <circle cx="-120" cy="120" r="20" fill="#14b8a6"/>
      <circle cx="0" cy="150" r="20" fill="#60a5fa"/>
      <circle cx="120" cy="120" r="20" fill="#8b5cf6"/>
    </g>
    
    <!-- Connection Lines -->
    <g stroke="#60a5fa" stroke-width="2" opacity="0.4">
      <line x1="0" y1="0" x2="-120" y2="-120"/>
      <line x1="0" y1="0" x2="0" y2="-150"/>
      <line x1="0" y1="0" x2="120" y2="-120"/>
      <line x1="0" y1="0" x2="-160" y2="0"/>
      <line x1="0" y1="0" x2="160" y2="0"/>
      <line x1="0" y1="0" x2="-120" y2="120"/>
      <line x1="0" y1="0" x2="0" y2="150"/>
      <line x1="0" y1="0" x2="120" y2="120"/>
    </g>
    
    <!-- Brain Icon in Center -->
    <g transform="scale(0.8)" fill="white">
      <path d="M-15,-20 Q-20,-30 -15,-35 Q-10,-40 0,-35 Q10,-40 15,-35 Q20,-30 15,-20 L15,20 Q10,25 0,25 Q-10,25 -15,20 Z"/>
      <path d="M-10,-15 L-10,15 M-5,-15 L-5,15 M0,-15 L0,15 M5,-15 L5,15 M10,-15 L10,15" stroke="url(#aiGrad1)" stroke-width="1.5" fill="none"/>
    </g>
  </g>
  
  <!-- Floating Code Brackets -->
  <g fill="#60a5fa" opacity="0.3" font-family="monospace" font-size="120" font-weight="bold">
    <text x="100" y="200">&lt;</text>
    <text x="1050" y="650">/&gt;</text>
  </g>
  
  <!-- Animated Data Particles -->
  <g>
    <circle cx="200" cy="150" r="3" fill="#14b8a6" opacity="0.6">
      <animate attributeName="cy" values="150;600;150" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="600" r="3" fill="#8b5cf6" opacity="0.6">
      <animate attributeName="cy" values="600;200;600" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="200" r="3" fill="#f59e0b" opacity="0.6">
      <animate attributeName="cy" values="200;550;200" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="500" r="3" fill="#ec4899" opacity="0.6">
      <animate attributeName="cy" values="500;250;500" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Decorative Circuits -->
  <g stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.2">
    <path d="M100,100 L200,100 L200,200 M200,150 L300,150"/>
    <path d="M1100,700 L1000,700 L1000,600 M1000,650 L900,650"/>
    <circle cx="200" cy="100" r="5" fill="#60a5fa"/>
    <circle cx="200" cy="200" r="5" fill="#60a5fa"/>
    <circle cx="1000" cy="700" r="5" fill="#60a5fa"/>
    <circle cx="1000" cy="600" r="5" fill="#60a5fa"/>
  </g>
</svg>
