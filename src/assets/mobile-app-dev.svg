<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="appGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradMobile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradMobile)"/>
  
  <!-- Floating Icons Background -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="60" fill="#3b82f6"/>
    <circle cx="700" cy="500" r="80" fill="#14b8a6"/>
    <circle cx="650" cy="100" r="50" fill="#8b5cf6"/>
  </g>
  
  <!-- Main Phone Device -->
  <g transform="translate(250, 80)">
    <!-- Phone Body -->
    <rect x="0" y="0" width="300" height="480" rx="30" fill="url(#phoneGrad)" stroke="#4c1d95" stroke-width="4"/>
    
    <!-- Screen -->
    <rect x="15" y="50" width="270" height="380" rx="15" fill="url(#screenGrad)"/>
    
    <!-- Notch -->
    <rect x="110" y="10" width="80" height="25" rx="12" fill="#0f172a"/>
    
    <!-- App Interface -->
    <g transform="translate(25, 70)">
      <!-- Status Bar -->
      <g fill="white" opacity="0.9">
        <text x="5" y="15" font-family="Arial" font-size="12">9:41</text>
        <circle cx="230" cy="10" r="3"/>
        <rect x="210" y="7" width="15" height="8" rx="2" fill="none" stroke="white" stroke-width="1"/>
        <rect x="226" y="9" width="2" height="4" fill="white"/>
      </g>
      
      <!-- App Content -->
      <!-- Header -->
      <rect x="0" y="30" width="250" height="50" rx="10" fill="url(#appGrad1)" opacity="0.8"/>
      <text x="15" y="58" font-family="Arial" font-size="18" font-weight="bold" fill="white">Dashboard</text>
      
      <!-- Cards -->
      <g transform="translate(0, 95)">
        <rect x="0" y="0" width="110" height="80" rx="8" fill="#3b82f6" opacity="0.2"/>
        <rect x="8" y="8" width="30" height="30" rx="5" fill="#3b82f6"/>
        <rect x="8" y="45" width="70" height="8" rx="4" fill="#60a5fa" opacity="0.5"/>
        <rect x="8" y="58" width="50" height="6" rx="3" fill="#60a5fa" opacity="0.3"/>
        
        <rect x="120" y="0" width="110" height="80" rx="8" fill="#14b8a6" opacity="0.2"/>
        <rect x="128" y="8" width="30" height="30" rx="5" fill="#14b8a6"/>
        <rect x="128" y="45" width="70" height="8" rx="4" fill="#5eead4" opacity="0.5"/>
        <rect x="128" y="58" width="50" height="6" rx="3" fill="#5eead4" opacity="0.3"/>
      </g>
      
      <!-- Chart Area -->
      <g transform="translate(0, 190)">
        <rect x="0" y="0" width="250" height="120" rx="10" fill="white" opacity="0.1"/>
        <!-- Simple Line Chart -->
        <polyline points="20,100 50,80 80,90 110,60 140,70 170,40 200,50 230,30" 
                  fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.8"/>
        <polyline points="20,90 50,100 80,85 110,95 140,80 170,75 200,85 230,70" 
                  fill="none" stroke="#14b8a6" stroke-width="3" opacity="0.8"/>
      </g>
    </g>
    
    <!-- Home Button -->
    <circle cx="150" cy="445" r="20" fill="#1e293b" opacity="0.3"/>
    <circle cx="150" cy="445" r="15" fill="none" stroke="#64748b" stroke-width="2"/>
  </g>
  
  <!-- Floating UI Elements -->
  <g opacity="0.7">
    <!-- Notification -->
    <g transform="translate(50, 200)">
      <rect x="0" y="0" width="180" height="60" rx="12" fill="white" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
      <circle cx="25" cy="30" r="12" fill="#3b82f6"/>
      <rect x="45" y="15" width="120" height="8" rx="4" fill="#cbd5e1"/>
      <rect x="45" y="30" width="90" height="6" rx="3" fill="#e2e8f0"/>
    </g>
    
    <!-- Settings Icon -->
    <g transform="translate(600, 150)">
      <circle cx="40" cy="40" r="35" fill="white" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
      <circle cx="40" cy="40" r="15" fill="none" stroke="#8b5cf6" stroke-width="3"/>
      <g stroke="#8b5cf6" stroke-width="3">
        <line x1="40" y1="20" x2="40" y2="25"/>
        <line x1="40" y1="55" x2="40" y2="60"/>
        <line x1="55" y1="30" x2="51" y2="33"/>
        <line x1="29" y1="47" x2="25" y2="50"/>
        <line x1="60" y1="40" x2="55" y2="40"/>
        <line x1="25" y1="40" x2="20" y2="40"/>
        <line x1="55" y1="50" x2="51" y2="47"/>
        <line x1="29" y1="33" x2="25" y2="30"/>
      </g>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <g fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3">
    <circle cx="100" cy="500" r="30"/>
    <circle cx="700" cy="100" r="25"/>
  </g>
</svg>
