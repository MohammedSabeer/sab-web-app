<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dashGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dashGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dashBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#dashBg)"/>
  
  <!-- Dashboard Container -->
  <g transform="translate(50, 50)">
    <!-- Main Dashboard Window -->
    <rect x="0" y="0" width="1100" height="500" rx="16" fill="white" filter="drop-shadow(0 20px 25px rgba(0,0,0,0.1))"/>
    
    <!-- Top Bar -->
    <rect x="0" y="0" width="1100" height="60" rx="16" fill="url(#dashGrad1)"/>
    <rect x="0" y="44" width="1100" height="16" fill="url(#dashGrad1)"/>
    
    <!-- Title -->
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">Analytics Dashboard</text>
    
    <!-- Search Bar -->
    <rect x="850" y="18" width="220" height="32" rx="16" fill="white" opacity="0.2"/>
    <text x="870" y="38" font-family="Arial" font-size="14" fill="white" opacity="0.8">Search...</text>
    
    <!-- Sidebar -->
    <rect x="20" y="80" width="200" height="400" rx="12" fill="#f8fafc"/>
    
    <!-- Menu Items -->
    <g transform="translate(30, 100)">
      <rect x="0" y="0" width="180" height="40" rx="8" fill="url(#dashGrad1)" opacity="0.15"/>
      <rect x="10" y="10" width="20" height="20" rx="4" fill="#3b82f6"/>
      <rect x="40" y="12" width="80" height="8" rx="4" fill="#64748b"/>
      
      <rect x="10" y="60" width="20" height="20" rx="4" fill="#64748b" opacity="0.3"/>
      <rect x="40" y="62" width="70" height="8" rx="4" fill="#94a3b8"/>
      
      <rect x="10" y="110" width="20" height="20" rx="4" fill="#64748b" opacity="0.3"/>
      <rect x="40" y="112" width="90" height="8" rx="4" fill="#94a3b8"/>
      
      <rect x="10" y="160" width="20" height="20" rx="4" fill="#64748b" opacity="0.3"/>
      <rect x="40" y="162" width="60" height="8" rx="4" fill="#94a3b8"/>
    </g>
    
    <!-- Stats Cards -->
    <g transform="translate(240, 80)">
      <!-- Card 1 -->
      <rect x="0" y="0" width="250" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="15" y="15" width="50" height="50" rx="8" fill="#dbeafe"/>
      <circle cx="40" cy="40" r="12" fill="#3b82f6"/>
      <text x="80" y="30" font-family="Arial" font-size="14" fill="#64748b">Total Users</text>
      <text x="80" y="60" font-family="Arial" font-size="28" font-weight="bold" fill="#1e293b">12.5K</text>
      <text x="80" y="85" font-family="Arial" font-size="12" fill="#10b981">↑ 12.5%</text>
      
      <!-- Card 2 -->
      <rect x="270" y="0" width="250" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="285" y="15" width="50" height="50" rx="8" fill="#d1fae5"/>
      <circle cx="310" cy="40" r="12" fill="#10b981"/>
      <text x="350" y="30" font-family="Arial" font-size="14" fill="#64748b">Revenue</text>
      <text x="350" y="60" font-family="Arial" font-size="28" font-weight="bold" fill="#1e293b">$45.2K</text>
      <text x="350" y="85" font-family="Arial" font-size="12" fill="#10b981">↑ 8.2%</text>
      
      <!-- Card 3 -->
      <rect x="540" y="0" width="250" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="555" y="15" width="50" height="50" rx="8" fill="#fce7f3"/>
      <circle cx="580" cy="40" r="12" fill="#ec4899"/>
      <text x="620" y="30" font-family="Arial" font-size="14" fill="#64748b">Projects</text>
      <text x="620" y="60" font-family="Arial" font-size="28" font-weight="bold" fill="#1e293b">248</text>
      <text x="620" y="85" font-family="Arial" font-size="12" fill="#10b981">↑ 15.3%</text>
    </g>
    
    <!-- Main Chart Area -->
    <g transform="translate(240, 220)">
      <rect x="0" y="0" width="840" height="250" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      
      <!-- Chart Title -->
      <text x="20" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b">Performance Overview</text>
      
      <!-- Y-axis Labels -->
      <g font-family="Arial" font-size="11" fill="#94a3b8">
        <text x="15" y="70" text-anchor="end">100</text>
        <text x="15" y="110" text-anchor="end">75</text>
        <text x="15" y="150" text-anchor="end">50</text>
        <text x="15" y="190" text-anchor="end">25</text>
        <text x="15" y="230" text-anchor="end">0</text>
      </g>
      
      <!-- Grid Lines -->
      <g stroke="#f1f5f9" stroke-width="1">
        <line x1="50" y1="70" x2="800" y2="70"/>
        <line x1="50" y1="110" x2="800" y2="110"/>
        <line x1="50" y1="150" x2="800" y2="150"/>
        <line x1="50" y1="190" x2="800" y2="190"/>
        <line x1="50" y1="230" x2="800" y2="230"/>
      </g>
      
      <!-- Line Chart -->
      <g>
        <!-- Area Fill -->
        <path d="M50,200 L120,180 L190,165 L260,140 L330,120 L400,110 L470,95 L540,85 L610,75 L680,70 L750,65 L800,60 L800,230 L50,230 Z" 
              fill="url(#dashGrad1)" opacity="0.1"/>
        
        <!-- Line -->
        <polyline points="50,200 120,180 190,165 260,140 330,120 400,110 470,95 540,85 610,75 680,70 750,65 800,60" 
                  fill="none" stroke="url(#dashGrad1)" stroke-width="3"/>
        
        <!-- Data Points -->
        <circle cx="50" cy="200" r="4" fill="#3b82f6"/>
        <circle cx="190" cy="165" r="4" fill="#3b82f6"/>
        <circle cx="330" cy="120" r="4" fill="#3b82f6"/>
        <circle cx="470" cy="95" r="4" fill="#3b82f6"/>
        <circle cx="610" cy="75" r="4" fill="#3b82f6"/>
        <circle cx="750" cy="65" r="4" fill="#3b82f6"/>
      </g>
      
      <!-- X-axis Labels -->
      <g font-family="Arial" font-size="11" fill="#94a3b8" text-anchor="middle">
        <text x="50" y="245">Jan</text>
        <text x="190" y="245">Mar</text>
        <text x="330" y="245">May</text>
        <text x="470" y="245">Jul</text>
        <text x="610" y="245">Sep</text>
        <text x="750" y="245">Nov</text>
      </g>
    </g>
  </g>
  
  <!-- Floating Data Indicators -->
  <g opacity="0.8">
    <g transform="translate(950, 120)">
      <rect x="0" y="0" width="200" height="80" rx="10" fill="white" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
      <circle cx="25" cy="40" r="15" fill="#dbeafe"/>
      <path d="M25,30 L25,40 L32,35 Z" fill="#3b82f6"/>
      <text x="50" y="32" font-family="Arial" font-size="12" fill="#64748b">Active Now</text>
      <text x="50" y="52" font-family="Arial" font-size="20" font-weight="bold" fill="#1e293b">1,842</text>
    </g>
  </g>
</svg>
