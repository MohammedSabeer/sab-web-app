<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shopGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shopGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shopBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#shopBg)"/>
  
  <!-- Shopping Bag Icon (Large Background) -->
  <g transform="translate(150, 100)" opacity="0.1">
    <path d="M50,0 L450,0 L500,500 L0,500 Z" fill="#f59e0b"/>
  </g>
  
  <!-- Browser Window -->
  <g transform="translate(50, 50)">
    <!-- Window Frame -->
    <rect x="0" y="0" width="700" height="500" rx="12" fill="white" filter="drop-shadow(0 20px 25px rgba(0,0,0,0.15))"/>
    
    <!-- Browser Bar -->
    <rect x="0" y="0" width="700" height="50" rx="12" fill="#f1f5f9"/>
    <rect x="0" y="38" width="700" height="12" fill="#f1f5f9"/>
    
    <!-- Window Controls -->
    <circle cx="20" cy="25" r="6" fill="#ef4444"/>
    <circle cx="40" cy="25" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="25" r="6" fill="#10b981"/>
    
    <!-- URL Bar -->
    <rect x="100" y="15" width="500" height="24" rx="12" fill="white"/>
    <text x="120" y="31" font-family="Arial" font-size="12" fill="#64748b">https://shop.example.com</text>
    <circle cx="580" cy="27" r="8" fill="#10b981" opacity="0.3"/>
    
    <!-- E-commerce Interface -->
    <!-- Header -->
    <rect x="0" y="50" width="700" height="60" fill="url(#shopGrad1)"/>
    <text x="30" y="87" font-family="Arial" font-size="24" font-weight="bold" fill="white">ShopMart</text>
    
    <!-- Navigation -->
    <g font-family="Arial" font-size="14" fill="white" opacity="0.9">
      <text x="200" y="87">Categories</text>
      <text x="300" y="87">Deals</text>
      <text x="370" y="87">New</text>
    </g>
    
    <!-- Cart Icon -->
    <g transform="translate(630, 70)">
      <circle cx="20" cy="20" r="18" fill="white" opacity="0.2"/>
      <path d="M15,15 L20,10 L25,15 L23,15 L23,25 L17,25 L17,15 Z" fill="white"/>
      <circle cx="28" cy="12" r="8" fill="#ef4444"/>
      <text x="28" y="16" font-family="Arial" font-size="10" font-weight="bold" fill="white" text-anchor="middle">3</text>
    </g>
    
    <!-- Search Bar -->
    <rect x="30" y="130" width="640" height="45" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="50" y="158" font-family="Arial" font-size="14" fill="#94a3b8">Search for products...</text>
    <circle cx="650" cy="152" r="15" fill="url(#shopGrad2)"/>
    
    <!-- Product Grid -->
    <g transform="translate(30, 200)">
      <!-- Product Card 1 -->
      <rect x="0" y="0" width="200" height="260" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="10" y="10" width="180" height="140" rx="8" fill="#dbeafe"/>
      <g transform="translate(70, 60)">
        <rect x="0" y="0" width="60" height="60" rx="8" fill="#3b82f6" opacity="0.3"/>
        <circle cx="30" cy="30" r="20" fill="#3b82f6" opacity="0.5"/>
        <path d="M20,30 L27,37 L40,24" stroke="white" stroke-width="3" fill="none"/>
      </g>
      <rect x="15" y="165" width="120" height="12" rx="6" fill="#cbd5e1"/>
      <rect x="15" y="185" width="80" height="10" rx="5" fill="#e2e8f0"/>
      <rect x="15" y="205" width="60" height="20" rx="4" fill="#10b981" opacity="0.2"/>
      <text x="20" y="220" font-family="Arial" font-size="14" font-weight="bold" fill="#10b981">$29.99</text>
      <rect x="120" y="210" width="65" height="30" rx="6" fill="url(#shopGrad1)"/>
      <text x="135" y="230" font-family="Arial" font-size="12" font-weight="bold" fill="white">Add</text>
      
      <!-- Product Card 2 -->
      <rect x="220" y="0" width="200" height="260" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="230" y="10" width="180" height="140" rx="8" fill="#fce7f3"/>
      <g transform="translate(290, 60)">
        <rect x="0" y="0" width="60" height="60" rx="8" fill="#ec4899" opacity="0.3"/>
        <circle cx="30" cy="30" r="20" fill="#ec4899" opacity="0.5"/>
        <path d="M25,25 L35,35 M35,25 L25,35" stroke="white" stroke-width="3"/>
      </g>
      <rect x="235" y="165" width="140" height="12" rx="6" fill="#cbd5e1"/>
      <rect x="235" y="185" width="90" height="10" rx="5" fill="#e2e8f0"/>
      <rect x="235" y="205" width="70" height="20" rx="4" fill="#10b981" opacity="0.2"/>
      <text x="240" y="220" font-family="Arial" font-size="14" font-weight="bold" fill="#10b981">$49.99</text>
      <rect x="340" y="210" width="65" height="30" rx="6" fill="url(#shopGrad1)"/>
      <text x="355" y="230" font-family="Arial" font-size="12" font-weight="bold" fill="white">Add</text>
      
      <!-- Product Card 3 -->
      <rect x="440" y="0" width="200" height="260" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="450" y="10" width="180" height="140" rx="8" fill="#dcfce7"/>
      <g transform="translate(510, 60)">
        <rect x="0" y="0" width="60" height="60" rx="8" fill="#10b981" opacity="0.3"/>
        <circle cx="30" cy="30" r="20" fill="#10b981" opacity="0.5"/>
        <path d="M30,20 L30,40 M20,30 L40,30" stroke="white" stroke-width="3"/>
      </g>
      <rect x="455" y="165" width="130" height="12" rx="6" fill="#cbd5e1"/>
      <rect x="455" y="185" width="100" height="10" rx="5" fill="#e2e8f0"/>
      <rect x="455" y="205" width="70" height="20" rx="4" fill="#10b981" opacity="0.2"/>
      <text x="460" y="220" font-family="Arial" font-size="14" font-weight="bold" fill="#10b981">$39.99</text>
      <rect x="560" y="210" width="65" height="30" rx="6" fill="url(#shopGrad1)"/>
      <text x="575" y="230" font-family="Arial" font-size="12" font-weight="bold" fill="white">Add</text>
    </g>
  </g>
  
  <!-- Floating Shopping Icons -->
  <g opacity="0.6">
    <!-- Credit Card -->
    <g transform="translate(20, 400)">
      <rect x="0" y="0" width="80" height="50" rx="6" fill="white" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
      <rect x="0" y="0" width="80" height="15" rx="6" fill="url(#shopGrad2)"/>
      <rect x="0" y="10" width="80" height="5" fill="url(#shopGrad2)"/>
      <rect x="10" y="25" width="40" height="8" rx="2" fill="#e2e8f0"/>
      <rect x="10" y="37" width="25" height="6" rx="2" fill="#e2e8f0"/>
    </g>
    
    <!-- Tag -->
    <g transform="translate(700, 480)">
      <path d="M0,0 L40,0 L60,20 L40,40 L0,40 L0,0 Z" fill="white" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
      <circle cx="15" cy="20" r="6" fill="#f59e0b"/>
      <text x="30" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#f59e0b">%</text>
    </g>
  </g>
</svg>
