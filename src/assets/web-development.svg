<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="editorBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="webBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#webBg)"/>
  
  <!-- Code Editor Window -->
  <g transform="translate(100, 80)">
    <!-- Window Frame -->
    <rect x="0" y="0" width="600" height="440" rx="12" fill="white" filter="drop-shadow(0 20px 25px rgba(0,0,0,0.15))"/>
    
    <!-- Title Bar -->
    <rect x="0" y="0" width="600" height="40" rx="12" fill="#e2e8f0"/>
    <rect x="0" y="28" width="600" height="12" fill="#e2e8f0"/>
    
    <!-- Window Controls -->
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="40" cy="20" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="20" r="6" fill="#10b981"/>
    
    <!-- Tab Bar -->
    <g transform="translate(100, 8)">
      <rect x="0" y="0" width="120" height="24" rx="4" fill="#cbd5e1"/>
      <text x="10" y="16" font-family="monospace" font-size="12" fill="#1e293b">index.jsx</text>
      
      <rect x="130" y="0" width="120" height="24" rx="4" fill="white"/>
      <text x="140" y="16" font-family="monospace" font-size="12" fill="#1e293b">App.jsx</text>
    </g>
    
    <!-- Editor Content -->
    <rect x="0" y="40" width="600" height="400" fill="url(#editorBg)"/>
    
    <!-- Line Numbers -->
    <g transform="translate(10, 55)" fill="#475569" font-family="monospace" font-size="14">
      <text x="0" y="15">1</text>
      <text x="0" y="35">2</text>
      <text x="0" y="55">3</text>
      <text x="0" y="75">4</text>
      <text x="0" y="95">5</text>
      <text x="0" y="115">6</text>
      <text x="0" y="135">7</text>
      <text x="0" y="155">8</text>
      <text x="0" y="175">9</text>
      <text x="0" y="195">10</text>
      <text x="0" y="215">11</text>
      <text x="0" y="235">12</text>
    </g>
    
    <!-- Code Content -->
    <g transform="translate(40, 55)" font-family="monospace" font-size="14">
      <!-- Line 1 -->
      <text x="0" y="15">
        <tspan fill="#c084fc">import</tspan>
        <tspan fill="#e2e8f0"> React </tspan>
        <tspan fill="#c084fc">from</tspan>
        <tspan fill="#34d399"> 'react'</tspan>
        <tspan fill="#e2e8f0">;</tspan>
      </text>
      
      <!-- Line 2 -->
      <text x="0" y="35">
        <tspan fill="#c084fc">import</tspan>
        <tspan fill="#e2e8f0"> </tspan>
        <tspan fill="#60a5fa">useState</tspan>
        <tspan fill="#e2e8f0"> </tspan>
        <tspan fill="#c084fc">from</tspan>
        <tspan fill="#34d399"> 'react'</tspan>
        <tspan fill="#e2e8f0">;</tspan>
      </text>
      
      <!-- Line 3 (empty) -->
      
      <!-- Line 4 -->
      <text x="0" y="75">
        <tspan fill="#c084fc">const</tspan>
        <tspan fill="#e2e8f0"> </tspan>
        <tspan fill="#60a5fa">App</tspan>
        <tspan fill="#e2e8f0"> = () </tspan>
        <tspan fill="#c084fc">=&gt;</tspan>
        <tspan fill="#e2e8f0"> {</tspan>
      </text>
      
      <!-- Line 5 -->
      <text x="20" y="95">
        <tspan fill="#c084fc">const</tspan>
        <tspan fill="#e2e8f0"> [count, setCount] = </tspan>
        <tspan fill="#60a5fa">useState</tspan>
        <tspan fill="#e2e8f0">(</tspan>
        <tspan fill="#f59e0b">0</tspan>
        <tspan fill="#e2e8f0">);</tspan>
      </text>
      
      <!-- Line 6 (empty) -->
      
      <!-- Line 7 -->
      <text x="20" y="135">
        <tspan fill="#c084fc">return</tspan>
        <tspan fill="#e2e8f0"> (</tspan>
      </text>
      
      <!-- Line 8 -->
      <text x="40" y="155">
        <tspan fill="#94a3b8">&lt;</tspan>
        <tspan fill="#60a5fa">div</tspan>
        <tspan fill="#f59e0b"> className</tspan>
        <tspan fill="#e2e8f0">=</tspan>
        <tspan fill="#34d399">"container"</tspan>
        <tspan fill="#94a3b8">&gt;</tspan>
      </text>
      
      <!-- Line 9 -->
      <text x="60" y="175">
        <tspan fill="#94a3b8">&lt;</tspan>
        <tspan fill="#60a5fa">h1</tspan>
        <tspan fill="#94a3b8">&gt;</tspan>
        <tspan fill="#e2e8f0">Count: {count}</tspan>
        <tspan fill="#94a3b8">&lt;/</tspan>
        <tspan fill="#60a5fa">h1</tspan>
        <tspan fill="#94a3b8">&gt;</tspan>
      </text>
      
      <!-- Line 10 -->
      <text x="60" y="195">
        <tspan fill="#94a3b8">&lt;</tspan>
        <tspan fill="#60a5fa">button</tspan>
        <tspan fill="#f59e0b"> onClick</tspan>
        <tspan fill="#e2e8f0">={() </tspan>
        <tspan fill="#c084fc">=&gt;</tspan>
        <tspan fill="#e2e8f0"> </tspan>
        <tspan fill="#60a5fa">setCount</tspan>
        <tspan fill="#e2e8f0">(count + </tspan>
        <tspan fill="#f59e0b">1</tspan>
        <tspan fill="#e2e8f0">)}</tspan>
        <tspan fill="#94a3b8">&gt;</tspan>
      </text>
      
      <!-- Line 11 -->
      <text x="80" y="215">
        <tspan fill="#e2e8f0">Increment</tspan>
      </text>
      
      <!-- Line 12 -->
      <text x="60" y="235">
        <tspan fill="#94a3b8">&lt;/</tspan>
        <tspan fill="#60a5fa">button</tspan>
        <tspan fill="#94a3b8">&gt;</tspan>
      </text>
    </g>
    
    <!-- Cursor Blink -->
    <rect x="220" y="265" width="2" height="16" fill="#60a5fa">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Floating Elements -->
  <g opacity="0.6">
    <!-- JSX Tag -->
    <g transform="translate(50, 250)">
      <rect x="0" y="0" width="80" height="50" rx="8" fill="white" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
      <text x="40" y="32" font-family="monospace" font-size="20" fill="#60a5fa" text-anchor="middle">&lt;/&gt;</text>
    </g>
    
    <!-- React Logo -->
    <g transform="translate(670, 450)">
      <circle cx="30" cy="30" r="28" fill="white" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
      <circle cx="30" cy="30" r="8" fill="#61dafb"/>
      <ellipse cx="30" cy="30" rx="22" ry="10" fill="none" stroke="#61dafb" stroke-width="2"/>
      <ellipse cx="30" cy="30" rx="22" ry="10" fill="none" stroke="#61dafb" stroke-width="2" transform="rotate(60 30 30)"/>
      <ellipse cx="30" cy="30" rx="22" ry="10" fill="none" stroke="#61dafb" stroke-width="2" transform="rotate(120 30 30)"/>
    </g>
  </g>
  
  <!-- Code Brackets -->
  <text x="30" y="80" font-family="monospace" font-size="60" fill="#3b82f6" opacity="0.2">{</text>
  <text x="740" y="560" font-family="monospace" font-size="60" fill="#3b82f6" opacity="0.2">}</text>
</svg>
