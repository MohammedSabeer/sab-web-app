<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon - Tech Bulb -->
  <g transform="translate(25, 25)">
    <circle cx="0" cy="-3" r="10" fill="url(#logoGradient)" opacity="0.9"/>
    <path d="M -5 6 Q -5 2 -3 -1 Q -1 1 0 0 Q 1 1 3 -1 Q 5 2 5 6 Z" fill="url(#logoGradient)" opacity="0.85"/>
    <line x1="-4" y1="-3" x2="4" y2="-3" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
    <line x1="-3" y1="-1" x2="3" y2="-1" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
    <line x1="-2" y1="1" x2="2" y2="1" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
    <rect x="-4" y="6" width="8" height="2.5" rx="1" fill="#e0f2fe"/>
    <rect x="-3" y="8.5" width="6" height="1.5" rx="0.5" fill="#cbd5e1"/>
    <circle cx="0" cy="-3" r="12" fill="none" stroke="#fff" stroke-width="1" opacity="0.15"/>
  </g>
  
  <!-- Text: Tech Logic Vibe -->
  <text x="55" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="url(#textGradient)">
    Tech Logic Vibe
  </text>
</svg>
