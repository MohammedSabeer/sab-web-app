<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background (optional, transparent) -->
  <rect width="800" height="200" fill="transparent"/>
  
  <!-- Icon - Tech Bulb -->
  <g transform="translate(100, 100)">
    <!-- Outer glow -->
    <circle cx="0" cy="-10" r="48" fill="url(#bgGradient)" opacity="0.15" filter="url(#glow)"/>
    
    <!-- Main bulb -->
    <circle cx="0" cy="-10" r="38" fill="url(#bgGradient)" opacity="0.95"/>
    
    <!-- Bulb bottom -->
    <path d="M -22 24 Q -22 8 -14 -4 Q -6 4 0 0 Q 6 4 14 -4 Q 22 8 22 24 Z" 
          fill="url(#bgGradient)" opacity="0.9"/>
    
    <!-- Filament lines - representing logic/code -->
    <line x1="-18" y1="-10" x2="18" y2="-10" stroke="#fff" stroke-width="5" opacity="0.8" stroke-linecap="round"/>
    <line x1="-14" y1="-2" x2="14" y2="-2" stroke="#fff" stroke-width="5" opacity="0.8" stroke-linecap="round"/>
    <line x1="-10" y1="6" x2="10" y2="6" stroke="#fff" stroke-width="5" opacity="0.8" stroke-linecap="round"/>
    
    <!-- Base of bulb -->
    <rect x="-20" y="24" width="40" height="12" rx="4" fill="#e0f2fe"/>
    <rect x="-16" y="36" width="32" height="8" rx="3" fill="#cbd5e1"/>
    
    <!-- Highlight shine -->
    <circle cx="-12" cy="-22" r="8" fill="#fff" opacity="0.4"/>
    
    <!-- Outer ring -->
    <circle cx="0" cy="-10" r="44" fill="none" stroke="#fff" stroke-width="3" opacity="0.25"/>
  </g>
  
  <!-- Text: Tech Logic Vibe -->
  <g transform="translate(220, 120)">
    <text font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="url(#textGradient)" letter-spacing="-1">
      Tech Logic Vibe
    </text>
    <text y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#64748b" letter-spacing="2">
      INNOVATIVE SOFTWARE SOLUTIONS
    </text>
  </g>
</svg>
