<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="150" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="530" r="120" fill="white" opacity="0.05"/>
  <circle cx="600" cy="315" r="250" fill="white" opacity="0.03"/>
  
  <!-- Logo/Icon -->
  <g transform="translate(100, 150)">
    <!-- Tech Bulb Icon -->
    <circle cx="50" cy="50" r="45" fill="url(#textGradient)" opacity="0.2"/>
    <path d="M50 20 C35 20, 25 30, 25 45 C25 55, 30 63, 38 68 L38 75 C38 78, 40 80, 43 80 L57 80 C60 80, 62 78, 62 75 L62 68 C70 63, 75 55, 75 45 C75 30, 65 20, 50 20 Z" fill="white"/>
    <rect x="43" y="82" width="14" height="4" rx="2" fill="white" opacity="0.8"/>
    <path d="M45 35 L50 45 L55 35" stroke="#2563eb" stroke-width="2" fill="none"/>
    <path d="M40 50 L45 55 L50 50 L55 55 L60 50" stroke="#14b8a6" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Main Text -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
    Tech Logic Vibe
  </text>
  
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="36" fill="white" opacity="0.9">
    Innovative Solutions, Logical Execution
  </text>
  
  <!-- Services Tags -->
  <g transform="translate(200, 370)">
    <rect width="180" height="50" rx="25" fill="white" opacity="0.15"/>
    <text x="90" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">
      AI Solutions
    </text>
  </g>
  
  <g transform="translate(400, 370)">
    <rect width="200" height="50" rx="25" fill="white" opacity="0.15"/>
    <text x="100" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">
      Mobile Apps
    </text>
  </g>
  
  <g transform="translate(620, 370)">
    <rect width="220" height="50" rx="25" fill="white" opacity="0.15"/>
    <text x="110" y="33" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">
      Web Development
    </text>
  </g>
  
  <!-- Bottom Stats -->
  <g transform="translate(200, 490)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#textGradient)">
      200+
    </text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.8">
      Projects Delivered
    </text>
  </g>
  
  <g transform="translate(450, 490)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#textGradient)">
      50+
    </text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.8">
      Happy Clients
    </text>
  </g>
  
  <g transform="translate(650, 490)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#textGradient)">
      99%
    </text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.8">
      Client Satisfaction
    </text>
  </g>
</svg>
